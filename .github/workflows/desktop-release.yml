name: Desktop release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. desktop-v0.1.1)'
        required: true
        default: 'desktop-v0.1.1'
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        working-directory: my-project-temp
        run: bun install

      - name: Build desktop (macOS)
        working-directory: my-project-temp
        env:
          CI: 'true'
        run: bun run tauri:build

      - name: Package macOS download
        working-directory: my-project-temp
        run: bash scripts/package-desktop.sh mac

      - uses: actions/upload-artifact@v4
        with:
          name: apical-mac
          path: my-project-temp/public/downloads/apical-mac.tar.gz
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      # Next.js/webpack on Windows runners can EACCES-scan the WindowsApps symlink.
      - name: Disable WindowsApps symlink before build
        shell: pwsh
        run: |
          $wa = Join-Path $env:LOCALAPPDATA 'Microsoft\WindowsApps'
          if (Test-Path $wa) {
            Rename-Item -Path $wa -NewName 'WindowsApps.bak' -ErrorAction SilentlyContinue
          }

      - name: Install dependencies
        working-directory: my-project-temp
        run: bun install

      - name: Build desktop (Windows)
        working-directory: my-project-temp
        env:
          CI: 'true'
        run: bun run tauri:build

      - name: Package Windows download
        working-directory: my-project-temp
        run: bash scripts/package-desktop.sh windows

      - uses: actions/upload-artifact@v4
        with:
          name: apical-windows
          path: my-project-temp/public/downloads/apical-windows.exe
          if-no-files-found: error

  publish:
    needs: [build-macos, build-windows]
    if: always() && needs.build-macos.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          name: apical-mac
          path: artifacts/apical-mac

      - uses: actions/download-artifact@v4
        if: needs.build-windows.result == 'success'
        with:
          name: apical-windows
          path: artifacts/apical-windows

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp artifacts/apical-mac/apical-mac.tar.gz release-assets/
          if [[ -f artifacts/apical-windows/apical-windows.exe ]]; then
            cp artifacts/apical-windows/apical-windows.exe release-assets/
          fi
          ls -la release-assets/

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Apical Desktop ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: true
          files: release-assets/*
          generate_release_notes: true
          make_latest: false

      - name: Write download manifest
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          MAC_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/apical-mac.tar.gz"
          WIN_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/apical-windows.exe"
          if [[ -f release-assets/apical-windows.exe ]]; then
            cat > my-project-temp/download/manifest.json <<EOF
          {
            "version": "${TAG}",
            "releasedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "files": {
              "apical-mac.tar.gz": "${MAC_URL}",
              "apical-windows.exe": "${WIN_URL}"
            }
          }
          EOF
          else
            cat > my-project-temp/download/manifest.json <<EOF
          {
            "version": "${TAG}",
            "releasedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "files": {
              "apical-mac.tar.gz": "${MAC_URL}"
            }
          }
          EOF
          fi
          cp my-project-temp/download/manifest.json download/manifest.json
          cat my-project-temp/download/manifest.json

      - name: Commit manifest for Vercel redirects
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add my-project-temp/download/manifest.json download/manifest.json
          git diff --staged --quiet || git commit -m "Update desktop download manifest for ${{ steps.tag.outputs.name }}"
          git push
