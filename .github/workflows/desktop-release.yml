name: Desktop release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. desktop-v0.1.1)'
        required: true
        default: 'desktop-v0.1.4'
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - name: Install packaging tools
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: '1'
        run: brew install create-dmg

      - name: Install dependencies
        working-directory: my-project-temp
        run: bun install

      - name: Regenerate brand icons
        working-directory: my-project-temp
        run: node scripts/generate-brand-icons.mjs

      - name: Build desktop (macOS universal)
        working-directory: my-project-temp
        env:
          CI: 'true'
          MACOSX_DEPLOYMENT_TARGET: '10.15'
          APICAL_UNIVERSAL_MAC: '1'
          CFLAGS: '-mmacosx-version-min=10.15'
          CXXFLAGS: '-mmacosx-version-min=10.15'
          RUSTFLAGS: '-C link-arg=-mmacosx-version-min=10.15'
        run: |
          rustup target add x86_64-apple-darwin aarch64-apple-darwin
          bun run tauri:build -- --target universal-apple-darwin

      - name: Package universal macOS DMG
        working-directory: my-project-temp
        run: bash scripts/package-desktop.sh mac apical-mac.dmg

      - name: Build desktop (Intel x86_64 fallback)
        working-directory: my-project-temp
        env:
          CI: 'true'
          MACOSX_DEPLOYMENT_TARGET: '10.15'
          APICAL_UNIVERSAL_MAC: '0'
          APICAL_NODE_TRIPLES: 'x86_64-apple-darwin'
          CFLAGS: '-mmacosx-version-min=10.15'
          CXXFLAGS: '-mmacosx-version-min=10.15'
          RUSTFLAGS: '-C link-arg=-mmacosx-version-min=10.15'
        run: bun run tauri:build -- --target x86_64-apple-darwin

      - name: Package Intel macOS DMG
        working-directory: my-project-temp
        run: bash scripts/package-desktop.sh mac apical-mac-intel.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: apical-mac
          path: |
            my-project-temp/public/downloads/apical-mac.dmg
            my-project-temp/public/downloads/apical-mac-intel.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      # Next.js/webpack on Windows runners can EACCES-scan the WindowsApps symlink.
      - name: Replace WindowsApps with empty junction
        shell: pwsh
        run: |
          $wa = Join-Path $env:LOCALAPPDATA 'Microsoft\WindowsApps'
          $empty = Join-Path $env:RUNNER_TEMP 'empty-windows-apps'
          New-Item -ItemType Directory -Force -Path $empty | Out-Null
          if (Test-Path $wa) { Remove-Item -LiteralPath $wa -Recurse -Force -ErrorAction SilentlyContinue }
          New-Item -ItemType Junction -Path $wa -Target $empty | Out-Null

      - name: Install dependencies
        working-directory: my-project-temp
        run: bun install

      - name: Build desktop (Windows)
        working-directory: my-project-temp
        env:
          CI: 'true'
        run: bun run tauri:build

      - name: Package Windows download
        working-directory: my-project-temp
        run: bash scripts/package-desktop.sh windows

      - uses: actions/upload-artifact@v4
        with:
          name: apical-windows
          path: my-project-temp/public/downloads/apical-windows.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      # AppImage bundling (linuxdeploy) fails on ubuntu-24.04 noble runners.
      # Jammy + libfuse2 + NO_STRIP is the reliable combo for Tauri AppImages in CI.
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libjavascriptcoregtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libfuse2 \
            libgtk-3-dev \
            libglib2.0-dev \
            file \
            wget

      - name: Install dependencies
        working-directory: my-project-temp
        run: bun install

      - name: Build desktop (Linux)
        working-directory: my-project-temp
        env:
          CI: 'true'
          NO_STRIP: 'true'
        run: bun run tauri:build

      - name: Package Linux download
        working-directory: my-project-temp
        run: bash scripts/package-desktop.sh linux

      - uses: actions/upload-artifact@v4
        with:
          name: apical-linux
          path: my-project-temp/public/downloads/apical-linux.AppImage
          if-no-files-found: error

  publish:
    needs: [build-macos, build-windows, build-linux]
    if: always() && needs.build-macos.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          name: apical-mac
          path: artifacts/apical-mac

      - uses: actions/download-artifact@v4
        if: needs.build-windows.result == 'success'
        with:
          name: apical-windows
          path: artifacts/apical-windows

      - uses: actions/download-artifact@v4
        if: needs.build-linux.result == 'success'
        with:
          name: apical-linux
          path: artifacts/apical-linux

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp artifacts/apical-mac/apical-mac.dmg release-assets/
          if [[ -f artifacts/apical-mac/apical-mac-intel.dmg ]]; then
            cp artifacts/apical-mac/apical-mac-intel.dmg release-assets/
          fi
          if [[ -f artifacts/apical-windows/apical-windows.exe ]]; then
            cp artifacts/apical-windows/apical-windows.exe release-assets/
          fi
          if [[ -f artifacts/apical-linux/apical-linux.AppImage ]]; then
            cp artifacts/apical-linux/apical-linux.AppImage release-assets/
          fi
          ls -la release-assets/

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Apical Desktop ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: true
          files: release-assets/*
          generate_release_notes: true
          make_latest: false

      - name: Write download manifest
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          MAC_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/apical-mac.dmg"
          MAC_INTEL_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/apical-mac-intel.dmg"
          WIN_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/apical-windows.exe"
          LINUX_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/apical-linux.AppImage"
          FILES='"apical-mac.dmg": "'"${MAC_URL}"'"'
          if [[ -f release-assets/apical-mac-intel.dmg ]]; then
            FILES="${FILES},
              \"apical-mac-intel.dmg\": \"${MAC_INTEL_URL}\""
          fi
          if [[ -f release-assets/apical-windows.exe ]]; then
            FILES="${FILES},
              \"apical-windows.exe\": \"${WIN_URL}\""
          fi
          if [[ -f release-assets/apical-linux.AppImage ]]; then
            FILES="${FILES},
              \"apical-linux.AppImage\": \"${LINUX_URL}\""
          fi
          cat > my-project-temp/download/manifest.json <<EOF
          {
            "version": "${TAG}",
            "releasedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "files": {
              ${FILES}
            }
          }
          EOF
          cp my-project-temp/download/manifest.json download/manifest.json
          cat my-project-temp/download/manifest.json

      - name: Commit manifest for Vercel redirects
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add my-project-temp/download/manifest.json download/manifest.json
          git diff --staged --quiet || git commit -m "Update desktop download manifest for ${{ steps.tag.outputs.name }}"
          git push
